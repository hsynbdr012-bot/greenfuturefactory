<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | أبواب WPC</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/animations.css">
</head>
<body>

    <div id="loader" class="loader-container">
        <div class="spinner"></div>
    </div>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">مصنع المستقبل الأخضر</div>
            <nav id="navMenu" class="nav-menu">
                <ul>
                    <li><a href="#">الرئيسية</a></li>
                    <li><a href="#tracking">تتبع الطلب</a></li>
                </ul>
            </nav>
            <div id="mobileMenuBtn" class="menu-toggle">☰</div>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">جودة تدوم للمستقبل</h1>
        </div>
    </section>

    <section id="tracking" class="section-padding">
        <div class="tracking-search-box">
            <input type="text" id="orderSearchInput" placeholder="أدخل رقم الطلب">
            <button id="btnSearchOrder">بحث</button>
        </div>
        <div id="trackingResultContainer" class="hidden">
            <p>اسم العميل: <span id="lblCustomerName"></span></p>
            <div class="progress-line-background">
                <div id="progressLineFill" class="progress-line-fill"></div>
            </div>
        </div>
    </section>

    <script src="./js/main.js"></script>
</body>
</html>
