<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | GFF</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f9f9f9; padding-bottom: 80px; } /* مساحة إضافية بالأسفل */
        
        .header { background: var(--green); color: white; padding: 20px; text-align: center; font-size: 1.4rem; font-weight: bold; border-bottom: 4px solid var(--gold); }
        .hero { padding: 30px 20px; text-align: center; }
        
        .stats { display: flex; justify-content: space-around; padding: 10px 20px; }
        .stat-box { background: var(--green); color: white; padding: 15px; border-radius: 12px; width: 45%; text-align: center; }
        .stat-box h3 { color: var(--gold); margin: 0; font-size: 1.5rem; }
        
        .card { background: white; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--green); border-radius: 8px; box-sizing: border-box; }
        button { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* تعديل زر الواتساب ليكون في زاوية آمنة ولا يغطي المحتوى */
        .whatsapp-float { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; /* نقلناه لليسار ليبقى بعيداً عن أزرار البحث */
            background: #25d366; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            z-index: 1000; 
        }
    </style>
</head>
<body>

    <header class="header">مصنع المستقبل الأخضر</header>

    <section class="hero">
        <h1>جودة تدوم للمستقبل</h1>
        <p>أبواب WPC بلمسة عصرية</p>
    </section>

    <div class="stats">
        <div class="stat-box"><h3>9+</h3><p>سنوات خبرة</p></div>
        <div class="stat-box"><h3>300+</h3><p>مشروع</p></div>
    </div>

    <div class="card">
        <h3>تتبع طلبك</h3>
        <input type="text" id="orderInput" placeholder="أدخل رقم الطلب">
        <button onclick="trackOrder()">بحث عن الطلب</button>
        <div id="result" style="margin-top:20px; color: var(--green); font-weight: bold;"></div>
    </div>

    <a href="https://wa.me/966555665136" class="whatsapp-float">واتساب 💬</a>

    <script>
        function trackOrder() {
            const val = document.getElementById('orderInput').value;
            const res = document.getElementById('result');
            if(val) { res.innerHTML = "جاري البحث عن طلب رقم: " + val; }
            else { alert("يرجى إدخال رقم الطلب"); }
        }
    </script>
</body>
</html>
