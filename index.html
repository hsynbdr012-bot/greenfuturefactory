<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFF | نظام تتبع الطلبات الذكي</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: var(--green); text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        
        /* شريط التتبع الاحترافي */
        .progress-container { margin-top: 30px; display: none; }
        .progress-bg { height: 12px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 1s; }
        .status-text { margin-top: 15px; font-weight: bold; color: var(--green); text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>تتبع طلبي الفوري</h2>
    <input type="text" id="nameInput" placeholder="أدخل اسم العميل...">
    <button onclick="trackOrder()">بحث عن الطلب</button>

    <div id="progressBox" class="progress-container">
        <div class="status-text" id="statusLabel"></div>
        <div class="progress-bg"><div id="progressBar" class="progress-fill"></div></div>
        <p id="percentText" style="text-align: center; color: #666;"></p>
    </div>
</div>

<script>
    // قاعدة بيانات تجريبية (أضف أي عميل هنا)
    const clients = {
        "بدر": { name: "بدر العتيبي", progress: 80, status: "جاري الشحن 🚚" },
        "أحمد": { name: "أحمد محمد", progress: 30, status: "مرحلة التصنيع 🛠️" },
        "سارة": { name: "سارة خالد", progress: 100, status: "تم التسليم بنجاح ✅" }
    };

    function trackOrder() {
        const name = document.getElementById('nameInput').value.trim();
        const box = document.getElementById('progressBox');
        if(clients[name]) {
            box.style.display = 'block';
            document.getElementById('statusLabel').innerText = clients[name].status;
            document.getElementById('progressBar').style.width = clients[name].progress + '%';
            document.getElementById('percentText').innerText = "نسبة الجاهزية: " + clients[name].progress + "%";
        } else {
            alert("عذراً، الاسم غير مسجل في النظام.");
        }
    }
</script>
</body>
</html>
