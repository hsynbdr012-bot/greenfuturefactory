<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GFF | تتبع طلباتك</title>
    <style>
        :root { 
            --primary: #0f3d32; /* أخضر غامق ملكي */
            --secondary: #b89764; /* ذهبي هادئ */
            --bg: #f9f7f2; /* كريمي فاتح جداً ومريح */
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .header { padding: 40px 20px; text-align: center; }
        .header h1 { color: var(--primary); margin: 0; font-size: 1.7rem; font-weight: 700; }
        .header p { color: #555; font-size: 0.9rem; margin-top: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #efeae4; }
        .stat-card h2 { color: var(--primary); margin: 0; font-size: 1.2rem; }
        .stat-card p { color: #999; font-size: 0.7rem; margin: 0; }

        .track-box { background: white; margin: 20px 15px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; }
        
        /* زر الواتساب العائم في الزاوية بعيداً عن المحتوى */
        .wa-float { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .wa-float img { width: 55px; height: 55px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        /* شريط التتبع */
        .progress-line { display: flex; justify-content: space-between; margin-top: 30px; overflow-x: auto; padding-bottom: 10px; }
        .step { text-align: center; font-size: 9px; color: #aaa; min-width: 40px; }
        .step.active { color: var(--primary); font-weight: bold; }
        .circle { width: 12px; height: 12px; background: #eee; border-radius: 50%; margin: 0 auto 5px; }
        .circle.active { background: var(--secondary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>مصنع المستقبل الأخضر</h1>
        <p>جودة تدوم لسنوات.. بمعايير عالمية</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h2>15,000+</h2><p>باب تم إنتاجه</p></div>
        <div class="stat-card"><h2>1,784+</h2><p>عميل سعيد</p></div>
    </div>

    <div class="track-box">
        <h3 style="text-align: center; color: var(--primary);">تتبع حالة طلبك</h3>
        <input type="text" id="nameInput" placeholder="أدخل اسم العميل...">
        <button onclick="track()">بحث عن الحالة</button>
        <div id="res" style="margin-top:25px;"></div>
    </div>

    <a href="https://wa.me/966555665136" class="wa-float">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <script>
        const db = {
            "بدر": { step: 4, stat: "🛠️ مرحلة التصنيع" },
            "أحمد": { step: 2, stat: "📏 مراجعة المقاسات" }
        };

        function track() {
            let name = document.getElementById('nameInput').value.trim();
            if(db[name]) {
                const stages = ["استلام", "مقاسات", "مراجعة", "تصنيع", "تغليف", "شحن", "تركيب", "تسليم"];
                let currentStep = db[name].step;
                let html = `<div style="text-align:center; margin-bottom:15px; font-weight:bold; color:var(--primary);">${db[name].stat}</div><div class="progress-line">`;
                stages.forEach((s, index) => {
                    let activeClass = index < currentStep ? "active" : "";
                    html += `<div class="step ${activeClass}"><div class="circle ${activeClass}"></div>${s}</div>`;
                });
                document.getElementById('res').innerHTML = html + "</div>";
            } else { alert("الاسم غير مسجل"); }
        }
    </script>
</body>
</html>
