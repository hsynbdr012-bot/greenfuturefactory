<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | GFF</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f9f9f9; position: relative; }
        
        /* خلفية الشعار الباهتة */
        body::before { content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; background-image: url('https://i.imgur.com/v8tT4gS.png'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.05; z-index: -1; }

        .header { background: var(--green); color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom: 5px solid var(--gold); }
        .hero { padding: 40px 20px; text-align: center; }
        .stats { display: flex; justify-content: space-around; padding: 20px; }
        .stat-box { background: var(--green); color: white; padding: 20px; border-radius: 12px; width: 40%; text-align: center; }
        .stat-box h3 { color: var(--gold); margin: 0; font-size: 1.6rem; }
        
        .card { background: white; margin: 20px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 90%; padding: 15px; margin: 10px 0; border: 2px solid var(--green); border-radius: 8px; }
        button { background: var(--gold); color: black; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; width: 90%; cursor: pointer; }

        /* زر الواتساب العائم */
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
    </style>
</head>
<body>

    <header class="header">مصنع المستقبل الأخضر</header>

    <section class="hero">
        <h1>جودة تدوم للمستقبل</h1>
        <p>أبواب WPC بلمسة عصرية</p>
    </section>

    <div class="stats">
        <div class="stat-box"><h3>9+</h3><p>سنوات خبرة</p></div>
        <div class="stat-box"><h3>300+</h3><p>مشروع</p></div>
    </div>

    <div class="card">
        <h3>تتبع طلبك</h3>
        <input type="text" id="orderInput" placeholder="أدخل رقم الطلب">
        <button onclick="trackOrder()">بحث عن الطلب</button>
        <div id="result" style="margin-top:20px;"></div>
    </div>

    <a href="https://wa.me/966555665136" class="whatsapp-float">تواصل معنا واتساب</a>

    <script>
        function trackOrder() {
            const val = document.getElementById('orderInput').value;
            const res = document.getElementById('result');
            if(val) { res.innerHTML = "جاري البحث عن طلب رقم: " + val + "..."; }
            else { alert("يرجى إدخال رقم الطلب"); }
        }
    </script>
</body>
</html>
