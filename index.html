<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | GFF</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; --black: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f9f9f9; }
        
        /* الهيدر */
        .header { background: var(--green); color: var(--white); padding: 15px; text-align: center; font-weight: bold; font-size: 1.5rem; }
        
        /* قسم الهيرو */
        .hero { background: var(--white); padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        h1 { color: var(--black); margin-bottom: 10px; }
        
        /* التتبع */
        .tracking-card { background: var(--white); margin: 20px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 2px solid var(--green); border-radius: 8px; font-size: 1rem; }
        button { background: var(--gold); color: var(--black); border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        /* رسالة النتيجة */
        #status-area { margin-top: 20px; padding: 15px; border-radius: 8px; background: #eee; display: none; }
    </style>
</head>
<body>

    <header>مصنع المستقبل الأخضر</header>

    <section class="hero">
        <h1>جودة تدوم للمستقبل</h1>
        <p>أبواب WPC بلمسة عصرية</p>
    </section>

    <div class="tracking-card">
        <h3>تتبع طلبك</h3>
        <input type="text" id="orderInput" placeholder="أدخل رقم الطلب">
        <button onclick="trackOrder()">بحث</button>
        <div id="status-area"></div>
    </div>

    <script>
        function trackOrder() {
            const input = document.getElementById('orderInput').value;
            const statusArea = document.getElementById('status-area');
            if(input.trim() !== "") {
                statusArea.style.display = 'block';
                statusArea.innerHTML = "<strong>حالة الطلب:</strong> جاري المعالجة... (رقم الطلب: " + input + ")";
            } else {
                alert("يرجى إدخال رقم الطلب أولاً");
            }
        }
    </script>
</body>
</html>
