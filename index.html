<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | GFF</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 80px; }
        
        .header { background: white; padding: 25px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h1 { color: var(--green); margin: 0; font-size: 1.6rem; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--green); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-card h2 { color: var(--gold); margin: 5px 0; font-size: 1.4rem; }
        
        .track-box { background: white; margin: 15px; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .wa-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

    <div class="header"><h1>مصنع المستقبل الأخضر</h1></div>

    <div class="stats-grid">
        <div class="stat-card">🚪<h2 id="count1">0</h2><p>باب تم إنتاجه</p></div>
        <div class="stat-card">👥<h2 id="count2">0</h2><p>عميل تم خدمته</p></div>
        <div class="stat-card" style="grid-column: span 2;">🏢<h2 id="count3">0</h2><p>شركة تطوير عقاري</p></div>
    </div>

    <div class="track-box">
        <h3>نظام تتبع الطلبات</h3>
        <input type="text" id="nameInput" placeholder="أدخل اسم العميل...">
        <button onclick="track()">بحث عن الطلب</button>
        <div id="res" style="margin-top:20px;"></div>
    </div>

    <a href="https://wa.me/966555665136" class="wa-btn">💬</a>

    <script>
        // العدادات المتحركة
        function animateValue(id, start, end, duration) {
            let range = end - start;
            let current = start;
            let stepTime = Math.abs(Math.floor(duration / range));
            let timer = setInterval(() => {
                current += 1;
                document.getElementById(id).innerText = current + "+";
                if (current == end) clearInterval(timer);
            }, stepTime);
        }
        animateValue("count1", 0, 15000, 2000);
        animateValue("count2", 0, 1300, 2000);
        animateValue("count3", 0, 40, 2000);

        // التتبع
        const db = { "بدر": { prog: 80, stat: "🚚 جاري الشحن" }, "أحمد": { prog: 40, stat: "🛠️ تصنيع" } };
        function track() {
            let name = document.getElementById('nameInput').value.trim();
            if(db[name]) {
                document.getElementById('res').innerHTML = `<strong>${db[name].stat}</strong><div style="height:10px; background:#eee; border-radius:5px; margin-top:10px;"><div style="height:100%; width:${db[name].prog}%; background:var(--gold); border-radius:5px;"></div></div>`;
            } else { alert("اسم العميل غير موجود"); }
        }
    </script>
</body>
</html>
