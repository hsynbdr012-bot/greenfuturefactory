<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>GFF | تتبع الطلبات</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--green); border-radius: 8px; box-sizing: border-box; }
        button { background: var(--gold); border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .progress-bar { display: flex; justify-content: space-between; margin-top: 25px; font-size: 10px; color: #aaa; }
        .step { flex: 1; position: relative; }
        .step.active { color: var(--green); font-weight: bold; }
        .step.active::after { content: '●'; display: block; color: var(--gold); margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>تتبع طلبك</h3>
        <input type="text" id="orderInput" placeholder="أدخل اسم العميل (مثلاً: أحمد)">
        <button onclick="trackOrder()">بحث عن الحالة</button>
        <div id="result" style="margin-top: 20px; display: none;"></div>
    </div>

    <script>
        // هنا قائمة العملاء التجريبية - أضف أي عدد تريده
        const clients = {
            "أحمد": { name: "أحمد محمد", stage: 1 },
            "سارة": { name: "سارة خالد", stage: 3 },
            "بدر": { name: "بدر العتيبي", stage: 5 },
            "فيصل": { name: "فيصل القحطاني", stage: 7 },
            "نورة": { name: "نورة عبدالله", stage: 8 }
        };

        function trackOrder() {
            const val = document.getElementById('orderInput').value.trim();
            const res = document.getElementById('result');
            
            if (clients[val]) {
                const stages = ["استلام", "مقاسات", "تصنيع", "تجميع", "تغليف", "شحن", "تركيب", "تسليم"];
                let html = `<strong>${clients[val].name}</strong><div class="progress-bar">`;
                stages.forEach((s, i) => {
                    html += `<div class="step ${i < clients[val].stage ? 'active' : ''}">${s}</div>`;
                });
                res.style.display = 'block';
                res.innerHTML = html + `</div>`;
            } else {
                res.style.display = 'block';
                res.innerHTML = "عذراً، لم نجد طلباً بهذا الاسم.";
            }
        }
    </script>
</body>
</html>
