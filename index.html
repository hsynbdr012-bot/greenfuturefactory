<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | GFF</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; --white: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: #f9f9f9; }
        
        /* الهيدر */
        header { background: var(--green); color: white; padding: 15px; text-align: center; font-size: 20px; }
        
        /* قسم الهيرو */
        .hero { padding: 40px 20px; text-align: center; }
        
        /* العدادات (المشكلة كانت هنا، جعلناها تظهر بجانب بعضها) */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: #333; color: white; }
        .stat-item { text-align: center; padding: 10px; }
        
        /* مربع التتبع */
        .tracking-section { background: white; padding: 25px; margin: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: var(--gold); border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <header>مصنع المستقبل الأخضر</header>

    <section class="hero">
        <h2>جودة تدوم للمستقبل</h2>
        <p>أبواب WPC بلمسة عصرية</p>
    </section>

    <div class="stats">
        <div class="stat-item"><h3>9</h3>سنوات خبرة</div>
        <div class="stat-item"><h3>+300</h3>مشروع</div>
    </div>

    <section class="tracking-section">
        <h3>تتبع طلبك</h3>
        <input type="text" id="orderInput" placeholder="أدخل رقم الطلب">
        <button onclick="trackOrder()">بحث</button>
    </section>

    <script>
        function trackOrder() {
            const input = document.getElementById('orderInput').value;
            if(input) { alert('جاري البحث عن الطلب: ' + input); }
            else { alert('يرجى إدخال رقم الطلب'); }
        }
    </script>
</body>
</html>
