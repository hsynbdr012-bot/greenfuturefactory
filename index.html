<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصنع المستقبل الأخضر | GFF</title>
    <style>
        :root { --green: #0d3a2b; --gold: #d4af37; --black: #1a1a1a; --white: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        /* الهيدر */
        .header { background: var(--green); color: var(--white); padding: 15px; text-align: center; font-weight: bold; font-size: 1.4rem; border-bottom: 4px solid var(--gold); }
        
        /* قسم الترحيب */
        .hero { background: var(--white); padding: 40px 20px; text-align: center; }
        .hero h1 { color: var(--black); margin: 0; }
        
        /* العدادات */
        .stats-container { display: flex; justify-content: space-around; padding: 20px; }
        .stat-box { background: var(--green); color: var(--white); padding: 20px; border-radius: 10px; width: 45%; text-align: center; }
        .stat-box h3 { color: var(--gold); margin: 0; font-size: 1.8rem; }
        
        /* التتبع */
        .tracking-card { background: var(--white); margin: 20px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid var(--green); border-radius: 8px; font-size: 1rem; }
        button { background: var(--gold); color: var(--black); border: none; padding: 15px 0; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        /* النتيجة */
        #status-area { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f5e9; color: var(--green); display: none; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">مصنع المستقبل الأخضر</header>

    <section class="hero">
        <h1>جودة تدوم للمستقبل</h1>
        <p>أبواب WPC بلمسة عصرية</p>
    </section>

    <div class="stats-container">
        <div class="stat-box"><h3>9+</h3><p>سنوات خبرة</p></div>
        <div class="stat-box"><h3>300+</h3><p>مشروع</p></div>
    </div>

    <div class="tracking-card">
        <h3>تتبع طلبك</h3>
        <input type="text" id="orderInput" placeholder="أدخل رقم الطلب">
        <button onclick="trackOrder()">بحث عن الطلب</button>
        <div id="status-area"></div>
    </div>

    <script>
        function trackOrder() {
            const input = document.getElementById('orderInput').value;
            const statusArea = document.getElementById('status-area');
            if(input.trim() !== "") {
                statusArea.style.display = 'block';
                statusArea.innerHTML = "حالة الطلب: قيد المعالجة (رقم: " + input + ")";
            } else {
                alert("يرجى إدخال رقم الطلب بشكل صحيح");
            }
        }
    </script>
</body>
</html>
